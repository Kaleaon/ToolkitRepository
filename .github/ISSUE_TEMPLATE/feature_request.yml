name: Feature Request
description: Suggest a new feature or tool
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible to help us understand your request.

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: A clear and concise description of what you want to happen
      placeholder: Describe the feature you'd like to see added
    validations:
      required: true

  - type: textarea
    id: problem-solution
    attributes:
      label: Problem/Solution
      description: Is your feature request related to a problem? Please describe the problem and how this feature would solve it.
      placeholder: I'm always frustrated when... This feature would help by...
    validations:
      required: true

  - type: dropdown
    id: feature-category
    attributes:
      label: Feature Category
      description: Which area would this feature belong to?
      options:
        - GitHub Actions Workflows
        - Build & CI/CD Tools
        - Static Analysis & Security
        - APK/Binary Analysis
        - Development Scripts
        - Docker & Containerization
        - Documentation & Templates
        - Automation & Tooling
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Low - Nice to have
        - Medium - Would improve my workflow
        - High - Essential for my use case
        - Critical - Blocking my work
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe your specific use case and how you would use this feature
      placeholder: I would use this feature when... It would help me...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: I've tried... but it doesn't work because...

  - type: textarea
    id: examples
    attributes:
      label: Examples/References
      description: Are there any other tools or services that implement this feature? Please provide examples or links.
      placeholder: Tool X does this by... Here's a link to an example...

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or mockups about the feature request here

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to ensure this feature hasn't been requested
          required: true
        - label: I have provided a clear description of the feature and its benefits
          required: true
        - label: This feature aligns with the toolkit's goal of consolidating development tools
          required: true