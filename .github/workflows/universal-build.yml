name: Manual Universal Build System

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: debug
        type: choice
        options:
        - debug
        - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 17
  ANDROID_API_LEVEL: 34
  ANDROID_BUILD_TOOLS: 33.0.2
  GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=1g -XX:+UseG1GC

jobs:
  setup:
    name: Environment Setup
    runs-on: ubuntu-latest
    outputs:
      host-architecture: ${{ steps.detect.outputs.host-architecture }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Host Architecture
        id: detect
        run: |
          HOST_ARCH=$(uname -m)
          case "$HOST_ARCH" in
            x86_64) ANDROID_ABI="x86_64" ;;
            aarch64|arm64) ANDROID_ABI="arm64-v8a" ;;
            armv7l|armhf) ANDROID_ABI="armeabi-v7a" ;;
            i386|i686) ANDROID_ABI="x86" ;;
            *) ANDROID_ABI="x86_64" ;;
          esac
          echo "host-architecture=$ANDROID_ABI" >> $GITHUB_OUTPUT
          echo "Detected architecture: $HOST_ARCH -> $ANDROID_ABI"

      - name: Validate Universal Build System
        run: |
          echo "Validating Universal Build System..."
          if [ -d "android-tools" ]; then
            echo "✅ Android tools directory found"
          else
            echo "❌ Android tools directory not found"
            exit 1
          fi
          
          if [ -f "build-scripts/universal-build.sh" ]; then
            echo "✅ Universal build script found"
            chmod +x build-scripts/*.sh
          else
            echo "❌ Universal build script not found"
            exit 1
          fi

  build:
    name: Universal Build
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.result == 'success'
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Accept Android SDK Licenses
        run: |
          SDKMANAGER_PATH="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [[ -f "$SDKMANAGER_PATH" ]]; then
            yes | "$SDKMANAGER_PATH" --licenses || true
          fi

      - name: Cache Build System
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android-tools/
          key: universal-build-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            universal-build-${{ runner.os }}-

      - name: Make scripts executable
        run: |
          chmod +x gradlew
          chmod +x build-scripts/*.sh || echo "Build scripts not found"

      - name: Test Universal Build System
        run: |
          echo "Testing Universal Build System..."
          ./build-scripts/universal-build.sh info || echo "Info command not available"

      - name: Build with Universal Build System
        run: |
          echo "Building project..."
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          
          if [ -f "./build-scripts/simple-build.sh" ]; then
            ./build-scripts/simple-build.sh build $BUILD_TYPE
          else
            export ANDROID_HOME=/opt/android-sdk
            if [ "$BUILD_TYPE" = "release" ]; then
              ./gradlew clean assembleRelease --stacktrace
            else
              ./gradlew clean assembleDebug --stacktrace
            fi
          fi

      - name: Verify Build Results
        run: |
          echo "Verifying build results..."
          find . -name "*.apk" -type f -exec ls -lh {} \; || echo "No APKs found"
          
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture**: ${{ needs.setup.outputs.host-architecture }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type**: ${{ github.event.inputs.build_type || 'debug' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.event.inputs.build_type || 'debug' }}-${{ github.sha }}
          path: |
            **/build/outputs/apk/**/*.apk
            **/build/outputs/mapping/**/*.txt
          retention-days: 30

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.build.result == 'success'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: test-${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Make scripts executable
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: |
          echo "Running unit tests..."
          ./gradlew testDebugUnitTest --stacktrace || echo "Unit tests not configured"

      - name: Run Lint Analysis
        run: |
          echo "Running lint analysis..."
          ./gradlew lintDebug --continue || echo "Lint not configured"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: |
            **/build/reports/tests/
            **/build/reports/lint-results*.html
          retention-days: 14

  status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [setup, build, test]
    if: always()
    
    steps:
      - name: Create Status Summary
        run: |
          echo "# 🎯 Universal Build System CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Status Overview" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.setup.result }}" = "success" ]; then
            echo "| Environment Setup | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Environment Setup | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "| Universal Build | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Universal Build | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "| Testing | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.test.result }}" = "skipped" ]; then
            echo "| Testing | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Testing | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## System Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Host Architecture**: ${{ needs.setup.outputs.host-architecture }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "🎉 **Overall Status**: ✅ SUCCESS - Universal Build System Working!" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Overall Status**: ❌ FAILED - Check individual job results above" >> $GITHUB_STEP_SUMMARY
          fi