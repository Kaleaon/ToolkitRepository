# PROVV Configuration File
# Place this file in your project root to customize PROVV behavior

# Analysis settings
analysis:
  strict_mode: true
  check_types: true
  verify_contracts: true
  max_complexity: 10
  
# Language-specific configurations
languages:
  javascript:
    parser: "@babel/parser"
    rules:
      - "no-null-pointer"
      - "bounds-check"
      - "type-safety"
      - "async-await-proper-handling"
    extensions: [".js", ".jsx", ".mjs"]
    
  typescript:
    parser: "@typescript-eslint/parser"
    rules:
      - "strict-null-checks"
      - "no-any-type"
      - "interface-over-type"
    extensions: [".ts", ".tsx"]
    
  python:
    parser: "ast"
    rules:
      - "division-by-zero"
      - "index-error"
      - "type-hints"
      - "exception-handling"
    extensions: [".py"]
    
  go:
    parser: "go/parser"
    rules:
      - "nil-pointer-check"
      - "goroutine-leaks"
      - "error-handling"
    extensions: [".go"]

# Monitoring and logging
monitoring:
  enabled: true
  log_level: "info"
  output_format: "json"
  real_time: false
  
# Reporting configuration
reporting:
  format: "text"  # Options: "text", "json", "html"
  include_suggestions: true
  include_proofs: true
  severity_threshold: "warning"  # Options: "error", "warning", "info"
  
# Integration settings
integrations:
  ide:
    enabled: true
    auto_fix: false
    highlight_issues: true
  
  ci_cd:
    fail_on_error: true
    fail_on_warning: false
    generate_artifacts: true
    
# Exclusions
exclude:
  directories:
    - "node_modules"
    - ".git"
    - "dist"
    - "build"
    - "__pycache__"
    - ".venv"
    - "vendor"
  
  files:
    - "*.min.js"
    - "*.test.js"
    - "*.spec.js"
    - "*_test.py"
    - "*_test.go"
  
  patterns:
    - "test_*"
    - "*_mock.py"
    - "*.generated.*"

# Custom rules (advanced)
custom_rules:
  - name: "custom-security-check"
    pattern: "eval\\("
    severity: "error"
    message: "Use of eval() is dangerous"
    suggestion: "Use JSON.parse() or other safe alternatives"
    
  - name: "todo-warning"
    pattern: "TODO|FIXME|HACK"
    severity: "info"
    message: "Code comment indicates pending work"